<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resto Roulette</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f8fafc, #e2e8f0);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      width: 90%;
      max-width: 500px;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    p {
      text-align: center;
      color: #555;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: black;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    .result {
      margin-top: 20px;
      padding: 16px;
      background: #eef2ff;
      border-radius: 12px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>🍽️ Resto Roulette</h1>
    <p>Laisse le hasard décider pour toi 😏</p>

    <input type="text" id="o1" placeholder="Option 1">
    <input type="text" id="o2" placeholder="Option 2">
    <input type="text" id="o3" placeholder="Option 3">
    <input type="text" id="o4" placeholder="Option 4">

    <button onclick="pick()">Choisir</button>

    <div class="result" id="result">
      Aucun choix pour l'instant
    </div>
  </div>

  <script>
    function pick() {
      const values = [
        o1.value,
        o2.value,
        o3.value,
        o4.value
      ].filter(v => v.trim() !== "");

      if (values.length < 2) {
        result.innerText = "Ajoute au moins 2 options";
        return;
      }

      const random = Math.floor(Math.random() * values.length);
      result.innerText = "👉 " + values[random];
    }
  </script>

</body>
</html>
