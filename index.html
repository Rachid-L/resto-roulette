<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resto Roulette</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f8fafc, #e2e8f0);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 28px;
      border-radius: 20px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.12);
      width: 100%;
      max-width: 520px;
    }

    h1 {
      text-align: center;
      margin: 0 0 10px;
      font-size: 32px;
    }

    p {
      text-align: center;
      color: #555;
      margin-bottom: 22px;
      line-height: 1.4;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
      box-sizing: border-box;
    }

    input:focus {
      outline: none;
      border-color: #111;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: black;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.96;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .secondary {
      background: #e5e7eb;
      color: #111;
    }

    .result {
      margin-top: 22px;
      padding: 20px;
      background: #eef2ff;
      border-radius: 14px;
      text-align: center;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 8px;
      overflow: hidden;
      position: relative;
    }

    .result-label {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
    }

    .result-value {
      font-size: 30px;
      font-weight: bold;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .result-value.spinning {
      animation: pulse 0.18s linear infinite;
    }

    .result-value.final {
      animation: pop 0.45s ease;
    }

    .meta {
      font-size: 13px;
      color: #64748b;
    }

    @keyframes pulse {
      0% {
        opacity: 0.45;
        transform: translateY(6px) scale(0.98);
      }
      50% {
        opacity: 1;
        transform: translateY(0) scale(1.02);
      }
      100% {
        opacity: 0.45;
        transform: translateY(-6px) scale(0.98);
      }
    }

    @keyframes pop {
      0% {
        transform: scale(0.85);
      }
      60% {
        transform: scale(1.08);
      }
      100% {
        transform: scale(1);
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>🍽️ Resto Roulette</h1>
    <p>Ajoute plusieurs options, lance le tirage, et laisse la roulette décider pour vous.</p>

    <input type="text" id="o1" placeholder="Option 1">
    <input type="text" id="o2" placeholder="Option 2">
    <input type="text" id="o3" placeholder="Option 3">
    <input type="text" id="o4" placeholder="Option 4">

    <div class="buttons">
      <button id="pickBtn" onclick="pick()">Lancer la roulette</button>
      <button class="secondary" onclick="resetApp()">Réinitialiser</button>
    </div>

    <div class="result">
      <div class="result-label">Résultat</div>
      <div class="result-value" id="result">Aucun choix pour l'instant</div>
      <div class="meta" id="meta"></div>
    </div>
  </div>

  <script>
    const resultEl = document.getElementById('result');
    const metaEl = document.getElementById('meta');
    const pickBtn = document.getElementById('pickBtn');

    function getOptions() {
      return [o1.value, o2.value, o3.value, o4.value]
        .map(value => value.trim())
        .filter(value => value !== '');
    }

    function chooseRandomIndex(length) {
      return Math.floor(Math.random() * length);
    }

    function resetApp() {
      [o1, o2, o3, o4].forEach(input => input.value = '');
      resultEl.textContent = "Aucun choix pour l'instant";
      resultEl.classList.remove('spinning', 'final');
      metaEl.textContent = '';
      pickBtn.disabled = false;
    }

    function pick() {
      const options = getOptions();

      if (options.length < 2) {
        resultEl.textContent = 'Ajoute au moins 2 options';
        resultEl.classList.remove('spinning', 'final');
        metaEl.textContent = 'Le tirage nécessite au minimum deux propositions.';
        return;
      }

      pickBtn.disabled = true;
      resultEl.classList.remove('final');
      resultEl.classList.add('spinning');
      metaEl.textContent = 'Tirage en cours...';

      let ticks = 0;
      const maxTicks = 14;

      const interval = setInterval(() => {
        const tempIndex = chooseRandomIndex(options.length);
        resultEl.textContent = options[tempIndex];
        ticks += 1;

        if (ticks >= maxTicks) {
          clearInterval(interval);

          const finalIndex = chooseRandomIndex(options.length);
          const finalChoice = options[finalIndex];

          resultEl.classList.remove('spinning');
          resultEl.classList.add('final');
          resultEl.textContent = `👉 ${finalChoice}`;
          metaEl.textContent = `Choix n°${finalIndex + 1} sur ${options.length}`;

          setTimeout(() => {
            resultEl.classList.remove('final');
          }, 500);

          pickBtn.disabled = false;
        }
      }, 110);
    }
  </script>
</body>
</html>
